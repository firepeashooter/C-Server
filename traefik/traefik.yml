log:
  level: INFO
  filePath: "/logs/traefik/traefik.log"
  format: json

accessLog:
  filePath: "/logs/traefik/access.log"
  format: json

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: duckdns

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /dynamic/dynamic.yml

certificatesResolvers:
  duckdns:
    acme:
      email: your-email@example.com
      storage: acme.json
      dnsChallenge:
        provider: duckdns
